<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - RAG Assistant</title>
    <link rel="stylesheet" th:href="@{/css/dsfr-local.css}" href="/css/dsfr-local.css" />
</head>

<body>
    <!-- Header -->
    <div th:insert="~{layout :: header}"></div>

    <!-- Main content -->
    <main role="main" id="content">
        <!-- Breadcrumb -->
        <div class="fr-container fr-mt-3w">
            <nav role="navigation" class="fr-breadcrumb" aria-label="vous êtes ici :">
                <ol class="fr-breadcrumb__list">
                    <li>
                        <a class="fr-breadcrumb__link" href="/">Accueil</a>
                    </li>
                    <li>
                        <a class="fr-breadcrumb__link" aria-current="page">Assistant RAG</a>
                    </li>
                </ol>
            </nav>
        </div>

        <div class="fr-container fr-mt-2w fr-mb-8w">
            <div class="fr-grid-row fr-grid-row--gutters">

                <!-- ============================== -->
                <!-- SIDEBAR: Téléverser            -->
                <!-- ============================== -->
                <div class="fr-col-12 fr-col-md-4 fr-col-lg-3">
                    <div class="fr-card fr-card--no-border" style="background-color: var(--grey-50);">
                        <div class="fr-card__body">
                            <h2 class="fr-card__title">Téléverser</h2>
                            <p class="fr-card__desc">
                                Ajoutez des documents PDF pour enrichir le contexte de l'assistant.
                            </p>
                            <form id="uploadForm">
                                <div class="fr-upload-group">
                                    <label class="fr-label" for="fileInput">
                                        Fichier PDF
                                        <span class="fr-hint-text">Sélectionnez un fichier au format .pdf</span>
                                    </label>

                                    <!-- Bouton personnalisé pour masquer le champ natif -->
                                    <div>
                                        <label for="fileInput" class="fr-btn fr-btn--secondary fr-btn--sm fr-mt-1v"
                                            style="cursor: pointer;">
                                            Choisir un fichier
                                        </label>
                                        <!-- Affichage du nom du fichier en dessous -->
                                        <div id="selectedFileName" class="fr-text--sm fr-mt-1v"
                                            style="color: var(--text-action-high-blue-france); font-weight: bold;">
                                            Aucun fichier sélectionné
                                        </div>
                                    </div>

                                    <input class="fr-upload" type="file" id="fileInput" accept=".pdf" required
                                        style="display: none;" />
                                </div>

                                <div class="fr-select-group fr-mt-2w">
                                    <label class="fr-label" for="splitterTypeSelect">Type de découpage</label>
                                    <select class="fr-select" id="splitterTypeSelect" name="splitterType">
                                        <option value="simple" selected>Simple (Token)</option>
                                        <option value="recursive">Récursif (Paragraphes)</option>
                                    </select>
                                </div>

                                <button class="fr-btn fr-mt-2w" type="submit" style="width: 100%;">
                                    Téléverser et traiter
                                </button>
                                <div id="uploadStatus" class="fr-mt-4w"></div>
                            </form>

                            <button id="clearBtn" class="fr-btn fr-btn--secondary fr-mt-2w" type="button"
                                style="width: 100%;">
                                RAZ BDD Vectorielle
                            </button>
                            <div id="clearStatus" class="fr-mt-2w"></div>

                            <!-- ============================== -->
                            <!-- Model Selection                -->
                            <!-- ============================== -->
                            <div class="fr-select-group fr-select-group--inline fr-mt-4w">
                                <label class="fr-label" for="modelSelect">Modèle LLM</label>
                                <select class="fr-select" id="modelSelect" name="modelSelect">
                                    <option th:each="model : ${availableModels}" th:value="${model}" th:text="${model}"
                                        th:selected="${model == 'glm-4.6:cloud'}">
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ============================== -->
                <!-- MAIN CHAT SECTION              -->
                <!-- ============================== -->
                <div class="fr-col-12 fr-col-md-8 fr-col-lg-9">
                    <h2 class="fr-mt-0">Conversation avec :</h2>
                    <div id="ingested-files-container" class="fr-mb-2w">
                        <span th:if="${#lists.isEmpty(ingestedFiles)}" class="fr-text--sm fr-text--light"
                            id="no-files-msg">Aucun fichier en base</span>
                        <span th:each="file : ${ingestedFiles}"
                            class="fr-badge fr-badge--info fr-badge--no-icon fr-mr-1v fr-mb-1v"
                            th:text="${file}"></span>
                    </div>

                    <!-- Chat History -->
                    <div id="chat-history" class="app-chat-history">
                        <!-- Messages go here -->
                    </div>

                    <!-- Chat Input -->
                    <div class="fr-input-group">
                        <label class="fr-label" for="questionInput">Votre question</label>
                        <textarea class="fr-input" id="questionInput" rows="5"
                            placeholder="Posez votre question ici… (Entrée pour envoyer, Maj+Entrée pour un saut de ligne)"></textarea>
                    </div>

                    <div class="app-chat-actions"
                        style="display: flex; justify-content: flex-end; align-items: center;">
                        <span id="loader" class="app-loader"
                            style="display: none; align-items: center; gap: 0.5rem; margin-right: 1rem; color: var(--text-action-high-blue-france);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <rect x="4" y="9" width="16" height="11" rx="2" stroke="currentColor"
                                    stroke-width="2" />
                                <path d="M8 9V7C8 5.89543 8.89543 5 10 5H14C15.1046 5 16 5.89543 16 7V9"
                                    stroke="currentColor" stroke-width="2" />
                                <line x1="12" y1="5" x2="12" y2="2" stroke="currentColor" stroke-width="2" />
                                <circle cx="12" cy="2" r="1.5" fill="currentColor" />
                                <circle cx="9" cy="13" r="1.5" fill="currentColor">
                                    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s"
                                        repeatCount="indefinite" />
                                </circle>
                                <circle cx="15" cy="13" r="1.5" fill="currentColor">
                                    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s"
                                        repeatCount="indefinite" begin="0.75s" />
                                </circle>
                                <path d="M9 17H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                <path d="M2 13H4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                <path d="M20 13H22" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                            </svg>
                            <strong>Réflexion en cours…</strong>
                        </span>
                        <button class="fr-btn" id="sendBtn">Envoyer</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div th:insert="~{layout :: footer}"></div>

    <script>
        // ========== Helper Functions ==========
        function updateIngestedFiles(files) {
            const container = document.getElementById('ingested-files-container');
            if (!container) return;
            container.innerHTML = '';
            if (files && files.length > 0) {
                files.forEach(file => {
                    const span = document.createElement('span');
                    span.className = 'fr-badge fr-badge--info fr-badge--no-icon fr-mr-1v fr-mb-1v';
                    span.textContent = file;
                    container.appendChild(span);
                });
            } else {
                const msg = document.createElement('span');
                msg.className = 'fr-text--sm fr-text--light';
                msg.id = 'no-files-msg';
                msg.textContent = 'Aucun fichier en base';
                container.appendChild(msg);
            }
        }

        // ========== Upload Logic ==========
        const fileInput = document.getElementById('fileInput');
        const selectedFileName = document.getElementById('selectedFileName');

        fileInput.addEventListener('change', function () {
            if (this.files && this.files.length > 0) {
                selectedFileName.textContent = this.files[0].name;
            } else {
                selectedFileName.textContent = 'Aucun fichier sélectionné';
            }
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusDiv = document.getElementById('uploadStatus');

            if (fileInput.files.length === 0) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const splitterType = document.getElementById('splitterTypeSelect').value;
            formData.append('splitterType', splitterType);

            statusDiv.innerHTML = '<div class="fr-alert fr-alert--info fr-alert--sm"><p>Téléversement et traitement en cours…</p></div>';

            try {
                const response = await fetch('/api/ingest', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.status === 'success') {
                    statusDiv.innerHTML = '<div class="fr-alert fr-alert--success fr-alert--sm"><p>' + result.message + '</p></div>';
                    if (result.files) updateIngestedFiles(result.files);
                } else {
                    statusDiv.innerHTML = '<div class="fr-alert fr-alert--error fr-alert--sm"><p>' + result.message + '</p></div>';
                }
            } catch (error) {
                statusDiv.innerHTML = '<div class="fr-alert fr-alert--error fr-alert--sm"><p>Erreur lors du téléversement du fichier.</p></div>';
            } finally {
                // Réinitialiser le champ visuel après l'envoi
                fileInput.value = '';
                selectedFileName.textContent = 'Aucun fichier sélectionné';
            }
        });

        // ========== Clear Logic ==========
        document.getElementById('clearBtn').addEventListener('click', async () => {
            const statusDiv = document.getElementById('clearStatus');
            statusDiv.innerHTML = '<div class="fr-alert fr-alert--info fr-alert--sm"><p>Effacement en cours…</p></div>';

            try {
                const response = await fetch('/api/clear', { method: 'POST' });
                const result = await response.json();
                if (result.status === 'success') {
                    statusDiv.innerHTML = '<div class="fr-alert fr-alert--success fr-alert--sm"><p>' + result.message + '</p></div>';
                    if (result.files) updateIngestedFiles(result.files);
                } else {
                    statusDiv.innerHTML = '<div class="fr-alert fr-alert--error fr-alert--sm"><p>' + result.message + '</p></div>';
                }
            } catch (error) {
                statusDiv.innerHTML = '<div class="fr-alert fr-alert--error fr-alert--sm"><p>Erreur lors de l\'effacement de la base.</p></div>';
            }
        });

        // ========== Chat Logic ==========
        const chatHistory = document.getElementById('chat-history');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const loader = document.getElementById('loader');

        async function sendMessage() {
            const text = questionInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            questionInput.value = '';

            // Désactiver les entrées
            questionInput.disabled = true;
            sendBtn.disabled = true;
            loader.style.display = 'flex';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: text,
                        model: document.getElementById('modelSelect').value
                    })
                });
                const result = await response.json();
                appendMessage(result.answer, 'assistant');
            } catch (error) {
                appendMessage("Erreur de communication avec le serveur.", 'assistant');
            } finally {
                loader.style.display = 'none';

                // Réactiver les entrées
                questionInput.disabled = false;
                sendBtn.disabled = false;
                questionInput.focus();

                chatHistory.scrollTop = chatHistory.scrollHeight;
            }
        }

        function appendMessage(text, role) {
            const div = document.createElement('div');
            div.className = 'app-message app-message--' + role;
            div.textContent = text;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);

        questionInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>

</html>
